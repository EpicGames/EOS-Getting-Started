; Tutorial log categories - surface the step-by-step OSS flow (login, session create/find/join,
; stats, leaderboards, title / player data storage, ecom). Default is VeryVerbose so learners see
; per-row detail (leaderboard rows, ecom offers/receipts/entitlements, AC byte traffic) without
; having to hunt for the right log command. Drop to Verbose / Log when shipping.
; Errors and Warnings from these categories are shown regardless of this setting.
[Core.Log]
LogEOSOSSTutorial=VeryVerbose
LogEOSAntiCheatPlugin=VeryVerbose

; Tutorial 10: AC kick grace periods, in seconds. Both SDK-clamped.
;   PeerAuthenticationTimeoutSeconds [40, 120] - P2P only, peer EAC remote-auth handshake.
;   RegisterTimeoutSeconds           [10, 120] - server only, post-RegisterClient integrity heartbeat.
[EOSAntiCheat]
PeerAuthenticationTimeoutSeconds=40
RegisterTimeoutSeconds=60
