#-------------------------------------------
# Anti-Cheat Integrity Tool Configuration - UE-aware variant.
#
# Ships with the EOSAntiCheat plugin; the RunUAT ProtectEOSPackage command
# passes it explicitly so we don't rely on the tool's default cfg (which is
# not UE-aware and would hash cooked .pak files, increasing catalog size
# and slowing EAC's client-side verification dramatically at launch).
#
# Only executable code belongs in the integrity catalog (.exe, .dll, .pdb
# for debug data). Asset, config, and data files are excluded below.
#-------------------------------------------

config_info:
{
    version = 2;
};

search_options:
{
    # No size threshold - catalog every executable regardless of size.
    exclude_size_threshold = 0;

    # Paths to skip. EasyAntiCheat/ is excluded because the tool writes into
    # EasyAntiCheat/Certificates/ itself - hashing those would create a
    # chicken-and-egg dependency.
    #
    # Content and Saved dirs are excluded wholesale: they hold assets, crash
    # dumps, logs, config - nothing executable. '*/Foo' matches Foo one level
    # deep (the tool supports single-level globs, not '**').
    exclude_paths = [
        "EasyAntiCheat",
        "logs",
        "screenshots",
        "updates",
        "Saved",
        "*/Saved",
        "Content",
        "*/Content",
        "Engine/Content",
        "Engine/Extras",
        "Engine/Plugins/*/Content",
        "*/Plugins/*/Content"
    ];

    # Files to ignore by extension. Policy: everything that's NOT executable code.
    # Starts from the tool's default list, extended with the UE-specific
    # cooked-asset + tooling extensions.
    # Policy: only .exe and .dll in the catalog. Every non-executable
    # extension we expect to see in a UE package is excluded here. If a new
    # extension sneaks in via the next engine drop, it'll show up in the
    # integrity tool's "Hashing ..." output - add it here.
    exclude_extensions = [
        # Tool defaults plus common data/config formats.
        ".bak", ".bat", ".bin", ".bmp", ".cer", ".cfg", ".conf", ".cur",
        ".db", ".dmp", ".ico", ".inf", ".ini", ".jpg", ".json", ".key",
        ".last", ".log", ".manifest", ".mdb", ".png", ".ps1", ".pubkey",
        ".runtime-xml", ".sh", ".svg", ".tga", ".tps", ".ttf", ".txt",
        ".vdf", ".xml", ".html", ".pdb",

        # UE cooked / asset / manifest formats.
        ".ubulk", ".ucas", ".udic", ".uexp", ".umap", ".upluginmanifest",
        ".uplugin", ".uproject", ".uasset", ".utoc", ".pak", ".sig",
        ".locres", ".locmeta"
    ];

    ignore_files_without_extension = false;
};

runtime_configuration:
{
    # TUTORIAL ONLY: three simultaneous instances so we can run Client + Client2
    # + Client3 from one machine (P2P kick-telemetry test needs all three). In a
    # real title keep this at 1 - allowing more lets a cheater spin up multiple
    # game processes to share telemetry / split suspicious traffic across processes.
    max_active_game_instances = 3;

    # Unreal's own crash handler (CrashReportClient.exe) is already whitelisted
    # by EAC - nothing to configure here.
};
